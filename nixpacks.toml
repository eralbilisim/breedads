[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "openssl", "vips"]

[phases.install]
cmds = [
  "cd server && npm install && npx prisma generate",
  "cd client && npm install"
]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "cd server && npx prisma migrate deploy && node index.js"

[variables]
PRISMA_ENGINES_MIRROR = "https://binaries.prisma.sh"
